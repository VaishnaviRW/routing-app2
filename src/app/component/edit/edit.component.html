<div class="container mt-4">

    <mat-card>
  
      <mat-card-header>
        <mat-card-title>
          Edit Course
        </mat-card-title>
      </mat-card-header>
  
      <mat-card-content>
  
        <form
          [formGroup]="courseForm"
          (ngSubmit)="onUpdate()">
  
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Course Name</mat-label>
            <input
              matInput
              formControlName="courseName">
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Duration</mat-label>
            <input
              matInput
              formControlName="duration">
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Trainer</mat-label>
            <input
              matInput
              formControlName="trainer">
          </mat-form-field>
  
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Fees</mat-label>
            <input
              matInput
              type="number"
              formControlName="fees">
          </mat-form-field>
  
          <button
            mat-raised-button
            color="primary">
            Update Course
          </button>
  
        </form>
  
      </mat-card-content>
  
    </mat-card>
  
  </div>
