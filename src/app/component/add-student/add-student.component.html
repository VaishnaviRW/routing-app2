<h2 mat-dialog-title>
    Add New Student
  </h2>
  
  <mat-dialog-content>
  
    <form [formGroup]="studentForm">
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Profile Photo URL</mat-label>
        <input matInput formControlName="profilePhoto">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Student ID</mat-label>
        <input matInput formControlName="studentId">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Mobile</mat-label>
        <input matInput formControlName="mobile">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Course</mat-label>
        <input matInput formControlName="course">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Trainer</mat-label>
        <input matInput formControlName="trainer">
      </mat-form-field>
  
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>City</mat-label>
        <input matInput formControlName="city">
      </mat-form-field>
  
    </form>
  
  </mat-dialog-content>
  
  <mat-dialog-actions align="end">
  
    <button
      mat-raised-button
      color="warn"
      mat-dialog-close>
      Cancel
    </button>
  
    <button
      mat-raised-button
      color="primary"
      (click)="onAddStudent()">
      Add Student
    </button>
  
  </mat-dialog-actions>
